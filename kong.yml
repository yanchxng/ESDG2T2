        paths:
          - /cancel-booking
        strip_path: true
    plugins:
      - name: rate-limiting
        config:
          minute: 5
          policy: local
      - name: jwt
        config:
          claims_to_verify:
            - exp
          run_on_preflight: false

  - name: consult-service
    url: http://consult-service:5000
    routes:
      - name: consult-route
        paths:
          - /consult
        strip_path: true
    plugins:
      - name: rate-limiting
        config:
          minute: 10
          policy: local
      - name: jwt
        config:
          claims_to_verify:
            - exp
          run_on_preflight: false

  - name: diagnosis-service
    url: http://diagnosis-service:5000
    routes:
      - name: diagnosis-route
        paths:
          - /diagnosis
        strip_path: true
    plugins:
      - name: rate-limiting
        config:
          minute: 10
          policy: local
      - name: jwt
        config:
          claims_to_verify:
            - exp
          run_on_preflight: false

  - name: payment-service
    url: http://payment-service:5000
    routes:
      - name: payment-route
        paths:
          - /payment
        strip_path: true
    plugins:
      - name: rate-limiting
        config:
          minute: 5
          policy: local
      - name: jwt
        config:
          claims_to_verify:
            - exp
          run_on_preflight: false

  - name: notification-service
    url: http://notification-service:5000
    routes:
      - name: notification-route
        paths:
          - /notification
        strip_path: true
    plugins:
      - name: rate-limiting
        config:
          minute: 10
          policy: local
      - name: jwt
        config:
          claims_to_verify:
            - exp
          run_on_preflight: false

consumers:
  - username: medilink-web-user
    jwt_secrets:
      - key: "http://localhost:8000"
        secret: "secret"
        algorithm: "HS256"
